parameters:
  azureSubscriptionEndpoint: $(azure.subscription.endpoint)
  azureVault: ''
  keyMapping: []

steps:
  - ${{ each secret in parameters.keyMapping }}:
      - task: AzureCLI@1
        displayName: "Set vault secrets ${{ secret.secret_name }}"
        inputs:
          azureSubscription: ${{ parameters.azureSubscriptionEndpoint }}
          scriptLocation: "inlineScript"
          inlineScript: |
            seachedSecret=$(az keyvault secret list --vault-name ${{ parameters.azureVault }}  --query "[?name=='${{ secret.secret_name }}'].name" -o tsv)
            varValue='$(${{ secret.env_var_name }})'
            secretType='${{ secret.type }}'
            if [ -z "$secretType" ]; then
              secretType=literal
            elif [ "$secretType" != "literal" ]; then
              varValue=$(${{ secret.env_var_name }})
            fi
            if [ -z "$seachedSecret" ]; then
                echo  "This is a new secret"
                if [ "$secretType" = "literal" ]; then
                    az keyvault secret set --name ${{ secret.secret_name }} --vault-name ${{ parameters.azureVault }}  --value '$(${{ secret.env_var_name }})'
                else
                    echo "Setting secret of type: $secretType"
                    az keyvault secret set --name ${{ secret.secret_name }} --vault-name ${{ parameters.azureVault }}  --value $(${{ secret.env_var_name }})
                fi
            else
                currentValue=$(az keyvault secret show --vault-name ${{ parameters.azureVault }} --name ${{ secret.secret_name }} --query 'value' -o tsv)
                if [ "$varValue" = "$currentValue" ]; then
                    echo "Secret has not changed. Skipped"
                else
                    if [ "$secretType" = "literal" ]; then
                        az keyvault secret set --name ${{ secret.secret_name }} --vault-name ${{ parameters.azureVault }}  --value '$(${{ secret.env_var_name }})'
                    else
                        echo "Setting secret of type: $secretType"
                        az keyvault secret set --name ${{ secret.secret_name }} --vault-name ${{ parameters.azureVault }}  --value $(${{ secret.env_var_name }})
                    fi
                fi
            fi
